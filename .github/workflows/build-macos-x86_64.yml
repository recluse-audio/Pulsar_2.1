name: Build macOS x86_64

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: macos-15  # ARM runner cross-compiling for x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake
        run: brew install cmake

      - name: Configure
        run: |
          cmake -S . -B BUILD \
            -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES=x86_64

      - name: Build VST3
        run: |
          cmake --build BUILD --target Pulsar_VST3 \
            --config ${{ github.event.inputs.config || 'Release' }}

      - name: Build AU
        run: |
          cmake --build BUILD --target Pulsar_AU \
            --config ${{ github.event.inputs.config || 'Release' }}

      - name: Build Standalone
        run: |
          cmake --build BUILD --target Pulsar_Standalone \
            --config ${{ github.event.inputs.config || 'Release' }}

      - name: Build All
        run: |
          cmake --build BUILD --target Pulsar_All \
            --config ${{ github.event.inputs.config || 'Release' }}

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Pulsar-macOS-x86_64-VST3
          path: BUILD/Pulsar_artefacts/${{ github.event.inputs.config || 'Release' }}/VST3/Pulsar.vst3

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: Pulsar-macOS-x86_64-AU
          path: BUILD/Pulsar_artefacts/${{ github.event.inputs.config || 'Release' }}/AU/Pulsar.component

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: Pulsar-macOS-x86_64-Standalone
          path: BUILD/Pulsar_artefacts/${{ github.event.inputs.config || 'Release' }}/Standalone/Pulsar.app

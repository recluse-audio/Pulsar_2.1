name: Build Windows

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: |
          cmake -S . -B BUILD -DCMAKE_BUILD_TYPE=${{ github.event.inputs.config || 'Release' }}

      - name: Build VST3
        run: |
          cmake --build BUILD --target Pulsar_VST3 --config ${{ github.event.inputs.config || 'Release' }}

      - name: Build Standalone
        run: |
          cmake --build BUILD --target Pulsar_Standalone --config ${{ github.event.inputs.config || 'Release' }}

      - name: Build All
        run: |
          cmake --build BUILD --target Pulsar_All --config ${{ github.event.inputs.config || 'Release' }}

      - name: Package bundles
        shell: pwsh
        run: |
          $config = "${{ github.event.inputs.config || 'Release' }}"
          Compress-Archive -Path "BUILD/Pulsar_artefacts/$config/VST3/Pulsar.vst3" -DestinationPath "Pulsar-Windows-VST3.zip"
          Compress-Archive -Path "BUILD/Pulsar_artefacts/$config/Standalone/Pulsar.exe" -DestinationPath "Pulsar-Windows-Standalone.zip"

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Pulsar-Windows-VST3
          path: Pulsar-Windows-VST3.zip

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: Pulsar-Windows-Standalone
          path: Pulsar-Windows-Standalone.zip

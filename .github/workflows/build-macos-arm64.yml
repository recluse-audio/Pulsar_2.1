name: Build macOS ARM64

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: macos-14  # Apple Silicon M1 runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake
        run: brew install cmake

      - name: Configure
        run: |
          cmake -S . -B BUILD \
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.config || 'Release' }} \
            -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build VST3
        run: |
          cmake --build BUILD --target Pulsar_VST3 \
            --config ${{ github.event.inputs.config || 'Release' }}

      - name: Build Standalone
        run: |
          cmake --build BUILD --target Pulsar_Standalone \
            --config ${{ github.event.inputs.config || 'Release' }}

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Pulsar-macOS-arm64-VST3
          path: BUILD/Pulsar_artefacts/${{ github.event.inputs.config || 'Release' }}/VST3/Pulsar.vst3

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: Pulsar-macOS-arm64-Standalone
          path: BUILD/Pulsar_artefacts/${{ github.event.inputs.config || 'Release' }}/Standalone/Pulsar.app
